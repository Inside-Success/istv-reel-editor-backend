name: Release macOS build

# Runs when you push a tag like v0.1.0, or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-mac:
    # Both arches build on the Apple Silicon runner. We can't rely on a native
    # Intel host: the hosted macos-13 runner is retired and its jobs sit queued
    # forever. Instead we cross-build:
    #   - ffmpeg-static downloads its single binary from `npm_config_arch` at
    #     install time, so we set it per matrix arch (see the install step).
    #   - ffprobe-static already bundles every arch and resolves at runtime.
    #   - electron-builder --<arch> fetches the matching Electron runtime.
    # A single-arch ffmpeg on the wrong Mac fails with macOS EBADARCH
    # (-86, "Bad CPU type in executable") the moment it spawns ffmpeg.
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: macos-14
    permissions:
      contents: write # needed to create/update the GitHub Release
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies (fetch ${{ matrix.arch }} ffmpeg binary)
        run: npm ci
        env:
          # ffmpeg-static's install script reads this to pick which binary to
          # download; without it we'd get the arm64 host binary for both DMGs.
          npm_config_arch: ${{ matrix.arch }}

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --${{ matrix.arch }} --publish always
